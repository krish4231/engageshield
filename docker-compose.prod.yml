version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: engageshield-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-engageshield}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-engageshield}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-engageshield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: engageshield-redis-prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: engageshield-backend-prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-engageshield}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-engageshield}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: '["${FRONTEND_URL:-http://localhost}"]'
      DEBUG: "false"
      LOG_LEVEL: "WARNING"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: engageshield-frontend-prod
    restart: always

  nginx:
    image: nginx:alpine
    container_name: engageshield-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  pgdata:
